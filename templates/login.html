<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saud Travels - Login</title>
    <!-- External CSS link maintained, but all professional animations added below -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <style>
        /* Modern & Attractive Dark Monochromatic Theme */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0d0f12;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Round Pan Find/Radar Animation */
        .bg-scanner-circle {
            position: absolute;
            width: 600px;
            height: 600px;
            border: 2px dashed rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
            animation: rotateRadar 20s linear infinite;
        }

        .bg-scanner-circle::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            width: 15px;
            height: 15px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 20px #fff, 0 0 40px #fff;
        }

        .bg-scanner-inner {
            position: absolute;
            width: 400px;
            height: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(180deg);
            z-index: 1;
            animation: rotateRadar 12s linear infinite reverse;
        }

        @keyframes rotateRadar {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Container & Card Style */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        /* 3D Black & White Header */
        .header-3d {
            text-align: center;
            font-size: 2.8rem;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            transform: perspective(500px) rotateX(10deg);
            text-shadow: 
                0 1px 0 #cccccc,
                0 2px 0 #b5b5b5,
                0 3px 0 #999999,
                0 4px 0 #777777,
                0 5px 0 #555555,
                0 6px 0 #333333,
                0 8px 10px rgba(0, 0, 0, 0.6);
        }

        /* Glassmorphism Professional Card */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            outline: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        /* Attractive Captcha Box */
        .captcha-box {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.02);
            padding: 10px;
            border-radius: 12px;
            border: 1px dashed rgba(255, 255, 255, 0.15);
        }

        #captchaText {
            font-size: 1.2rem;
            font-weight: bold;
            background: #ffffff;
            color: #000000;
            padding: 10px 20px;
            border-radius: 8px;
            letter-spacing: 2px;
            user-select: none;
            box-shadow: 0 4px 10px rgba(255, 255, 255, 0.2);
        }

        .captcha-box input {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
        }

        .captcha-box input:focus {
            border-color: #fff;
        }

        /* Professional Modern Button */
        .btn {
            width: 100%;
            padding: 15px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
        }

        .btn:hover {
            background: #e5e5e5;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.4);
        }

        /* Bottom Moving Scan Animation Line */
        .bottom-scan-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            overflow: hidden;
            z-index: 5;
        }

        .bottom-scan-bar {
            width: 150px;
            height: 100%;
            background: linear-gradient(90deg, transparent, #ffffff, transparent);
            position: absolute;
            animation: moveScanBar 3s linear infinite;
        }

        @keyframes moveScanBar {
            0% { left: -150px; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>

    <!-- Background Round Animations -->
    <div class="bg-scanner-circle"></div>
    <div class="bg-scanner-inner"></div>

    <div class="container">
        <!-- 3D Black & White Header Title -->
        <h1 class="header-3d">Saud Travels</h1>
        
        <div class="card">
            <!-- Form points to /dashboard -->
            <form action="/dashboard" method="POST" onsubmit="return validateLogin()">
                
                <!-- Only Full Name Input Field -->
                <div class="input-group">
                    <label>Your Name</label>
                    <input type="text" id="userName" name="userName" placeholder="Enter Your Full Name" required autocomplete="off">
                </div>
                
                <!-- Mathematical Captcha Box -->
                <div class="captcha-box">
                    <span id="captchaText"></span>
                    <input type="number" id="captchaInput" placeholder="Answer" required>
                </div>
                
                <button type="submit" class="btn">Login Securely</button>
            </form>
        </div>
    </div>

    <!-- Bottom Moving Pan Find Animation Line -->
    <div class="bottom-scan-container">
        <div class="bottom-scan-bar"></div>
    </div>

    <script>
        let expectedAns;
        
        // Generate Math Captcha
        function loadCaptcha() {
            let n1 = Math.floor(Math.random() * 10) + 1;
            let n2 = Math.floor(Math.random() * 10) + 1;
            expectedAns = n1 + n2;
            document.getElementById('captchaText').innerText = `${n1} + ${n2}`;
        }

        function validateLogin() {
            let ans = parseInt(document.getElementById('captchaInput').value);
            if(ans !== expectedAns) {
                alert("Captcha galat hai! Kripya sahi answer dalein.");
                loadCaptcha();
                document.getElementById('captchaInput').value = "";
                return false; // Form submit hone se roke
            }
            return true; // Form submit hone de
        }

        window.onload = loadCaptcha;
    </script>
</body>
</html>
